name: Validate

on:
  pull_request:
  push:
    branches:
      - codex/aerotermia-frigorias

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci --silent
      - name: Capture typecheck
        id: typecheck
        shell: bash
        run: |
          set +e
          npm run typecheck > typecheck.log 2>&1
          code=$?
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          cat typecheck.log
          exit 0
      - name: Upload typecheck log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: typecheck-log
          path: typecheck.log
      - name: Fail on typecheck errors
        if: steps.typecheck.outputs.exit_code != '0'
        run: exit 1
      - name: Run tests
        run: npm test
      - name: Build
        run: npm run build
