# GitHub Actions
name: ci

on:
  push:
  pull_request:

jobs:
  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run test
      - run: npm run build
      - name: Check obvious secrets
        run: |
          ! grep -RInE "(BEGIN (RSA|OPENSSH|PRIVATE) KEY|AIza|sk-[A-Za-z0-9]|ISIVOLT_KEYSTORE_PASSWORD=.+)" -- . --exclude-dir=node_modules --exclude-dir=.git --exclude=package-lock.json
      - uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: dist
